name: Deploy Web to GitHub Pages

on:
  push:
    branches:
      - user/heeseop
      - main
    paths:
      - "web_client/**"
      - ".github/workflows/deploy-web-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web_client
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web_client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Resolve GitHub Pages platform index
        env:
          AIPMS_PLATFORM_URL: ${{ vars.AIPMS_PLATFORM_URL || '' }}
          AIPMS_PAGES_BASE_PATH: ${{ vars.AIPMS_PAGES_BASE_PATH || '' }}
          REPOSITORY_NAME: ${{ github.event.repository.name }}
        run: |
          pages_url="${AIPMS_PLATFORM_URL:-https://${GITHUB_REPOSITORY_OWNER}.github.io/${REPOSITORY_NAME}}"
          base_path="${AIPMS_PAGES_BASE_PATH:-/${REPOSITORY_NAME}/}"
          case "$pages_url" in
            http://127.*|https://127.*|http://localhost*|https://localhost*|\
            http://10.*|https://10.*|http://192.168.*|https://192.168.*|\
            http://172.1[6-9].*|https://172.1[6-9].*|http://172.2[0-9].*|https://172.2[0-9].*|\
            http://172.3[0-1].*|https://172.3[0-1].*)
              echo "AIPMS_PLATFORM_URL must be the GitHub Pages platform URL or another public HTTPS URL, not a local/LAN IP: $pages_url" >&2
              exit 2
              ;;
          esac
          mkdir -p public/platform
          cat > public/platform/index.json <<EOF
          {
            "kind": "meetflow_platform_index",
            "version": 1,
            "mode": "github_pages_static_index",
            "platform_base_url": "$pages_url",
            "platform_api_url": "$pages_url",
            "platform_index_url": "$pages_url/platform/index.json",
            "web_console_url": "$pages_url/",
            "public_urls": {
              "platform_index": "$pages_url/platform/index.json",
              "web_console": "$pages_url/",
              "run_hub": "$pages_url/run/",
              "execution_json": "$pages_url/run/execution.json",
              "apk_download_page": "$pages_url/downloads/",
              "apk_file": "$pages_url/downloads/AI-PMS-Recorder.apk"
            },
            "capabilities": {
              "static_index": true,
              "static_web": true,
              "dynamic_rest_api": false,
              "server_side_callbacks": false
            }
          }
          EOF
          {
            echo "AIPMS_RESOLVED_PLATFORM_URL=$pages_url"
            echo "AIPMS_RESOLVED_PLATFORM_INDEX_URL=$pages_url/platform/index.json"
            echo "AIPMS_RESOLVED_BASE_PATH=$base_path"
          } >> "$GITHUB_ENV"

      - name: Build
        run: |
          VITE_API_BASE="$AIPMS_RESOLVED_PLATFORM_URL" \
          VITE_PLATFORM_INDEX_URL="$AIPMS_RESOLVED_PLATFORM_INDEX_URL" \
          VITE_BASE_PATH="$AIPMS_RESOLVED_BASE_PATH" \
          npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web_client/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
