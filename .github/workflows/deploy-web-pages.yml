name: Deploy Web to GitHub Pages

on:
  push:
    branches:
      - user/heeseop
      - main
    paths:
      - "web_client/**"
      - ".github/workflows/deploy-web-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web_client
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web_client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate Platform server URL
        env:
          AIPMS_PLATFORM_URL: ${{ vars.AIPMS_PLATFORM_URL || '' }}
        run: |
          if [ -z "$AIPMS_PLATFORM_URL" ]; then
            echo "AIPMS_PLATFORM_URL repository variable is required." >&2
            echo "Set it to the Platform server public HTTPS URL." >&2
            exit 2
          fi
          case "$AIPMS_PLATFORM_URL" in
            http://127.*|https://127.*|http://localhost*|https://localhost*|\
            http://10.*|https://10.*|http://192.168.*|https://192.168.*|\
            http://172.1[6-9].*|https://172.1[6-9].*|http://172.2[0-9].*|https://172.2[0-9].*|\
            http://172.3[0-1].*|https://172.3[0-1].*)
              echo "AIPMS_PLATFORM_URL must be the Platform server URL, not a local/LAN IP: $AIPMS_PLATFORM_URL" >&2
              exit 2
              ;;
          esac

      - name: Build
        env:
          VITE_API_BASE: ${{ vars.AIPMS_PLATFORM_URL || '' }}
          VITE_BASE_PATH: ${{ vars.AIPMS_PAGES_BASE_PATH || '/llm-meeting-assistant/' }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web_client/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
