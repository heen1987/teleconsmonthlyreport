<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI-PMS Recorder 설치 확인</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f3f7fb;
        color: #0b1720;
      }
      main {
        max-width: 880px;
        margin: 0 auto;
        padding: 32px 18px;
      }
      header,
      section {
        background: #ffffff;
        border: 1px solid #d9e3ec;
        border-radius: 8px;
        padding: 22px;
      }
      header {
        margin-bottom: 14px;
      }
      .grid {
        display: grid;
        gap: 14px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      h1,
      h2,
      p {
        margin: 0;
      }
      h1 {
        font-size: 28px;
        line-height: 1.2;
      }
      h2 {
        font-size: 18px;
        margin-bottom: 10px;
      }
      p,
      li,
      dd,
      dt {
        color: #405465;
        font-size: 14px;
        line-height: 1.55;
      }
      p {
        margin-top: 8px;
      }
      ol,
      ul {
        margin: 8px 0 0;
        padding-left: 20px;
      }
      a.button {
        display: inline-block;
        margin-top: 18px;
        margin-right: 8px;
        padding: 12px 16px;
        border-radius: 8px;
        background: #1769ff;
        color: #ffffff;
        text-decoration: none;
        font-weight: 700;
      }
      a.button.secondary {
        background: #0f5e72;
      }
      dl {
        display: grid;
        grid-template-columns: 120px 1fr;
        gap: 8px 12px;
        margin: 12px 0 0;
      }
      dt {
        color: #667789;
      }
      dd {
        margin: 0;
        overflow-wrap: anywhere;
      }
      @media (max-width: 760px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>MEETFLOW APK</h1>
        <a class="button" href="./AI-PMS-Recorder.apk" download>APK 다운로드</a>
        <a class="button secondary" href="./">다운로드 정보</a>
      </header>

      <div class="grid">
        <section>
          <h2>APK 정보</h2>
          <dl>
            <dt>File</dt>
            <dd>AI-PMS-Recorder.apk</dd>
            <dt>Layout</dt>
            <dd>휴대폰 / 태블릿</dd>
            <dt>Size</dt>
            <dd>10.7 MB</dd>
          </dl>
        </section>

        <section>
          <h2>화면</h2>
          <dl>
            <dt>휴대폰</dt>
            <dd>단일 화면</dd>
            <dt>태블릿</dt>
            <dd>분할 화면</dd>
          </dl>
        </section>
      </div>
    </main>
  </body>
</html>
